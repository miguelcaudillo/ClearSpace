<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClearSpace — Card 12 Preview</title>
<style>
body{font-family:"Segoe UI",Arial,sans-serif;background:#eef2f0;margin:0;padding:30px 20px;color:#0b1f18}
h1{text-align:center;color:#065f46;font-size:1.4rem;margin-bottom:4px}
p.note{text-align:center;color:#5c6f67;font-size:.9rem;margin-bottom:28px}
.row{display:flex;flex-wrap:wrap;gap:40px;justify-content:center;align-items:flex-start}
.wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
.label{font-weight:700;color:#047857}
.frame{width:7.875in;height:4.725in;box-shadow:0 12px 34px rgba(2,44,34,.22);border-radius:6px;overflow:hidden;position:relative;background:#fff}
.frame iframe{width:3.75in;height:2.25in;border:none;transform:scale(2.1);transform-origin:top left}
.trim{position:absolute;inset:.2625in;border:1px dashed rgba(220,60,60,.5);pointer-events:none;border-radius:2px}
.legend{text-align:center;color:#94a3a0;font-size:.8rem;margin-top:22px}
@media(max-width:900px){.frame{width:5.25in;height:3.15in}.frame iframe{transform:scale(1.4)}}
</style>
</head>
<body>
<h1>Card 12 — Typographic Hero (vivid emerald)</h1>
<p class="note">Shown enlarged. Actual printed size 3.5″ × 2″. Red dashed line = trim edge.</p>
<div class="row">
  <div class="wrap"><span class="label">FRONT</span><div class="frame"><iframe src="card12-front.html" title="front"></iframe><div class="trim"></div></div></div>
  <div class="wrap"><span class="label">BACK</span><div class="frame"><iframe src="card12-back.html" title="back"></iframe><div class="trim"></div></div></div>
</div>
<p class="legend">Print files: <b>card12-front.pdf</b> &amp; <b>card12-back.pdf</b> (3.5×2 + 0.125″ bleed).</p>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
/* Card 12 BACK — 3.5x2 trim + .125 bleed = 3.75x2.25in — vivid emerald to match front */
@page { size: 3.75in 2.25in; margin: 0; }
*{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
html,body{width:3.75in;height:2.25in}
.bleed{width:3.75in;height:2.25in;background:linear-gradient(145deg,#a7f3d0 0%,#7fe9c4 52%,#5fddb4 100%);position:relative;overflow:hidden;font-family:"Segoe UI",Arial,sans-serif;color:#053528}
.bleed::after{content:"";position:absolute;width:2.2in;height:2.2in;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.5),transparent 70%);bottom:-1in;left:-.7in}
.safe{position:absolute;top:.3in;left:.32in;right:.32in;bottom:.3in;display:flex;flex-direction:column;justify-content:space-between;z-index:1}
.brand{display:flex;align-items:center;gap:.1in}
.mk{width:.4in;height:.4in;border-radius:.12in;background:#064e3b;display:flex;align-items:center;justify-content:center;font-size:.22in;line-height:1;color:#a7f3d0}
.name{font-family:"Avenir Next","Segoe UI",Arial,sans-serif;font-weight:800;font-size:.19in;letter-spacing:-.01in;color:#064e3b}
.name b{font-weight:900;color:#022c22}
.headline{font-family:"Avenir Next","Segoe UI",Arial,sans-serif;font-weight:800;font-size:.15in;line-height:1.22;color:#064e3b;max-width:2.7in}
ul{list-style:none}
li{font-size:.093in;color:#065f46;padding:.026in 0 .026in .18in;position:relative;line-height:1.2;font-weight:600}
li::before{content:"\2713";position:absolute;left:0;color:#047857;font-weight:900}
.foot{border-top:1px solid rgba(6,78,59,.28);padding-top:.09in;display:flex;flex-direction:column;gap:.02in}
.foot .e{font-size:.093in;font-weight:700;color:#053528}
.foot .w{font-size:.083in;color:#065f46}
</style>
</head>
<body>
<div class="bleed">
  <div class="safe">
    <div class="brand"><span class="mk">&#10022;</span><span class="name">Clear<b>Space</b></span></div>
    <div class="headline">A spotless home, without lifting a finger.</div>
    <ul>
      <li>Standard, deep &amp; move-out cleaning</li>
      <li>Recurring service &mdash; save up to 20%</li>
      <li>Flat-rate pricing &middot; 48-hour guarantee</li>
    </ul>
    <div class="foot">
      <span class="e">&#9993; ClearSpaceCleaning113@gmail.com &nbsp;&middot;&nbsp; (801) 433-7342</span>
      <span class="w">miguelcaudillo.github.io/ClearSpace &middot; West Jordan, UT</span>
    </div>
  </div>
</div>
</body>
</html>

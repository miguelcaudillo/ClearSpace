<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
/* Card 12 FRONT — Typographic Hero — 3.5x2 trim + .125 bleed = 3.75x2.25in */
@page { size: 3.75in 2.25in; margin: 0; }
*{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
html,body{width:3.75in;height:2.25in}
.bleed{width:3.75in;height:2.25in;background:linear-gradient(145deg,#a7f3d0 0%,#7fe9c4 52%,#5fddb4 100%);position:relative;overflow:hidden;font-family:"Avenir Next","Segoe UI",Arial,sans-serif;color:#053528}
.bleed::after{content:"";position:absolute;width:2.4in;height:2.4in;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.55),transparent 70%);top:-1.1in;right:-.8in}
.safe{position:absolute;top:.3in;left:.32in;right:.32in;bottom:.3in;display:flex;flex-direction:column;justify-content:center;gap:.1in;z-index:1}
.huge{font-weight:900;font-size:.42in;letter-spacing:-.012in;line-height:1;color:#064e3b}
.huge b{font-weight:900;color:#022c22}
.rule{width:.6in;height:.026in;background:#065f46;border-radius:.02in;margin:.02in 0;opacity:.75}
.row{display:flex;justify-content:space-between;align-items:flex-end;margin-top:.04in}
.tag{font-size:.088in;letter-spacing:.028in;text-transform:uppercase;font-weight:800;color:#065f46;display:flex;align-items:center;gap:.05in}
.tag .spk{color:#047857;font-size:.11in}
.ph{font-weight:800;font-size:.2in;letter-spacing:.004in;color:#053528;text-align:right;font-family:"Segoe UI",Arial,sans-serif}
.sub{font-size:.08in;color:#065f46;text-align:right;margin-top:.015in;font-weight:600}
</style>
</head>
<body>
<div class="bleed">
  <div class="safe">
    <div>
      <div class="huge">Clear<b>Space</b></div>
      <div class="rule"></div>
    </div>
    <div class="row">
      <span class="tag"><span class="spk">&#10022;</span> Home Cleaning</span>
      <div>
        <div class="ph">(801) 433-7342</div>
        <div class="sub">English &amp; Espa&ntilde;ol</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
